name: ci-tests-coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ./PedidoApi/PedidoApi.sln

      - name: Test with coverage
        run: dotnet test ./PedidoApi/PedidoApi.sln --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML report
        run: reportgenerator -reports:"./TestResults/**/coverage.cobertura.xml" -targetdir:"./coveragereport" -reporttypes:Html

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport

      - name: Upload raw coverage xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: ./TestResults/**/coverage.cobertura.xml
